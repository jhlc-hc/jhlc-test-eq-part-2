<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Global Emotional Intelligence Test - Part 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    @media print {
      body { background: white !important; color: black !important; }
      header, footer, button, .print-hidden { display: none !important; }
      .shadow-sm, .shadow-md { box-shadow: none !important; }
      .print-card { border: 2px solid #cbd5e1 !important; background-color: #fff !important; }
    }
  </style>
</head>
<body class="bg-slate-50/50 min-h-screen text-slate-800 antialiased flex flex-col select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const QUADRANTS = [
      { id: 2, name: 'Social Awareness & Relationship Matrix', englishName: 'PART 2', description: 'Rata-rata Kuadran: 7.5 / 10.0 (Rentang Skor Valid per Pilar: 5.0 - 10.0)' }
    ];

    const QUESTIONS = [
      // --- PILLAR 3 ---
      { id: 21, quadrant: 2, pillar: 3, text: 'Perbedaan antar kelompok selalu ada', options: [{ text: 'Dipahami dan dihargai.', score: 1 }, { text: 'Menyebabkan kesulitan dan keresahan.', score: 0.5 }] },
      { id: 22, quadrant: 2, pillar: 3, text: 'Ketika saya melihat prasangka dan intoleransi, saya selalu', options: [{ text: 'Menantang orang-orang yang memulai.', score: 1 }, { text: 'Menutup mata dan mengabaikannya.', score: 0.5 }] },
      { id: 23, quadrant: 2, pillar: 3, text: 'Saya selalu membantu berdasarkan', options: [{ text: 'Memahami kebutuhan dan perasaan orang lain.', score: 1 }, { text: 'Tugas-tugas yang membutuhkan bantuan orang lain.', score: 0.5 }] },
      { id: 24, quadrant: 2, pillar: 3, text: 'Saya selalu', options: [{ text: 'Mendengarkan dengan baik dan memperhatikan isyarat emosional.', score: 1 }, { text: 'Dengarkan kata-kata penting yang disampaikan.', score: 0.5 }] },
      { id: 25, quadrant: 2, pillar: 3, text: 'Perspektif lain selalu ada.', options: [{ text: 'Mengaburkan masalah dan membuat kita keluar jalur.', score: 0.5 }, { text: 'Dipahami dan kepekaan ditunjukkan.', score: 1 }] },
      { id: 26, quadrant: 2, pillar: 3, text: 'Saya selalu menemukan jejaring sosial di dalam organisasi.', options: [{ text: 'Membantu menciptakan jaringan pengambilan keputusan yang lebih baik.', score: 1 }, { text: 'Menghambat penyampaian kinerja.', score: 0.5 }] },
      { id: 27, quadrant: 2, pillar: 3, text: 'Saya selalu menggunakan', options: [{ text: 'Hubungan kekuasaan kunci informal untuk mendapatkan apa yang saya butuhkan.', score: 1 }, { text: 'Jaringan pengambilan keputusan formal untuk mendapatkan apa yang saya butuhkan.', score: 0.5 }] },
      { id: 28, quadrant: 2, pillar: 3, text: 'Saya selalu', options: [{ text: 'Memahami kebutuhan pelanggan dan mencocokkan produk/layanan.', score: 1 }, { text: 'Berikan kepada pelanggan apa yang mereka minta.', score: 0.5 }] },
      { id: 29, quadrant: 2, pillar: 3, text: 'Saya selalu', options: [{ text: 'Bertanggung jawab atau bertindak sebagai penasihat terpercaya bagi pelanggan.', score: 1 }, { text: 'Katakan pada pelanggan apa yang ingin mereka dengar.', score: 0.5 }] },
      { id: 30, quadrant: 2, pillar: 3, text: 'Meningkatkan kepuasan dan loyalitas pelanggan', options: [{ text: 'Itu selalu menjadi bagian dari cara saya bekerja.', score: 1 }, { text: 'Tidak penting dalam mencapai penjualan.', score: 0.5 }] },

      // --- PILLAR 4 ---
      { id: 31, quadrant: 2, pillar: 4, text: 'Visi dan misi selalu', options: [{ text: 'Digunakan untuk menginspirasi kelompok dan individu.', score: 1 }, { text: 'Diberikan kepada staf agar mereka tahu ke mana kita akan pergi.', score: 0.5 }] },
      { id: 32, quadrant: 2, pillar: 4, text: 'Saya selalu', options: [{ text: 'Beri tahu orang-orang tentang perilaku yang diharapkan.', score: 0.5 }, { text: 'Menjadi teladan dalam perilaku yang diharapkan dari orang lain.', score: 1 }] },
      { id: 33, quadrant: 2, pillar: 4, text: 'Saya selalu memberikan assignment kepada orang-orang yang', options: [{ text: 'Akan tumbuh dan berkembang sebagai hasil dari tantangan tersebut.', score: 1 }, { text: 'Mable menyelesaikan pekerjaan dan melakukannya dengan baik.', score: 0.5 }] },
      { id: 34, quadrant: 2, pillar: 4, text: 'Memenangkan hati orang lain adalah sesuatu', options: [{ text: 'Saya sangat mahir dalam hal itu.', score: 1 }, { text: 'Itu yang menurutku sulit dilakukan.', score: 0.5 }] },
      { id: 35, quadrant: 2, pillar: 4, text: 'Saya selalu berkomunikasi dengan cara', options: [{ text: 'Yang berupaya mencapai saling pengertian dan berbagi informasi secara menyeluruh.', score: 1 }, { text: 'Agar semua orang mengerti apa yang saya katakan.', score: 0.5 }] },
      { id: 36, quadrant: 2, pillar: 4, text: 'Saya selalu', options: [{ text: 'Ikuti perubahan yang didorong oleh orang lain.', score: 0.5 }, { text: 'Menyadari perlunya perubahan dan menghilangkan hambatan.', score: 1 }] },
      { id: 37, quadrant: 2, pillar: 4, text: 'Saya selalu menangani orang-orang yang sulit', options: [{ text: 'Dengan cara yang lugas dan langsung.', score: 0.5 }, { text: 'Dengan diplomasi dan taktik.', score: 1 }] },
      { id: 38, quadrant: 2, pillar: 4, text: 'Saya selalu mencari hubungan yang', options: [{ text: 'Saling menguntungkan.', score: 1 }, { text: 'Akan membantu saya mencapai tujuan akhir saya.', score: 0.5 }] },
      { id: 39, quadrant: 2, pillar: 4, text: 'Saya umumnya memiliki', options: [{ text: 'Fokus yang lebih kuat pada tugas daripada hubungan.', score: 0.5 }, { text: 'Fokus yang seimbang antara tugas dan hubungan.', score: 1 }] },
      { id: 40, quadrant: 2, pillar: 4, text: 'Saat saya bekerja dengan tim, saya selalu', options: [{ text: 'Jelaskan dengan gamblang apa yang saya harapkan dari para anggota.', score: 0.5 }, { text: 'Libatkan semua anggota untuk berpartisipasi dengan antusias.', score: 1 }] }
    ];

    function App() {
      const [appState, setAppState] = useState('QUESTIONS');
      const [answers, setAnswers] = useState({});

      const handleAnswerChange = (qId, data) => { setAnswers(prev => ({ ...prev, [qId]: data })); };
      const isAllAnswered = QUESTIONS.every(q => answers[q.id] !== undefined);

      if (appState === 'RESULTS') {
        let p3 = 0, p4 = 0;
        QUESTIONS.forEach(q => {
          if (q.pillar === 3) p3 += answers[q.id]?.score || 0;
          if (q.pillar === 4) p4 += answers[q.id]?.score || 0;
        });
        const totalScore = p3 + p4;

        return (
          <div className="max-w-6xl mx-auto my-6 p-4 w-full space-y-6">
            <div className="bg-white rounded p-6 md:p-8 space-y-6 border border-slate-200">
              <div className="flex justify-between items-center border-b pb-4">
                <div>
                  <span className="text-xs font-bold uppercase text-emerald-600 bg-emerald-50 px-2 py-1 rounded">OFFICIAL COMPETENCY REPORT — PART 2</span>
                  <h1 className="text-2xl font-bold text-slate-900 mt-1">{QUADRANTS[0].name}</h1>
                  <p className="text-xs text-slate-500 mt-1">Nama: <span className="font-bold text-slate-700">Internal Participant</span> &bull; Dept: <span className="font-bold text-slate-700">Marcom</span></p>
                </div>
                <div className="flex gap-2 print-hidden">
                  <button onClick={() => window.print()} className="px-4 py-2 bg-slate-100 border text-xs font-bold rounded hover:bg-slate-200 cursor-pointer">Export Report (PDF)</button>
                  <button onClick={() => { setAnswers({}); setAppState('QUESTIONS'); }} className="px-4 py-2 bg-slate-900 text-white text-xs font-bold rounded hover:bg-slate-800 cursor-pointer">Reset Tes</button>
                </div>
              </div>

              <div className="bg-[#FFFF00] border-2 border-slate-900 p-8 text-center rounded print-card">
                <span className="text-xs font-bold tracking-widest uppercase block text-slate-800">PART 2 CUMULATIVE SCORE</span>
                <div className="text-5xl font-black font-mono mt-1 text-slate-900">{totalScore.toFixed(1)} <span className="text-2xl font-sans font-normal text-slate-600">/20.0</span></div>
                <p className="text-xs font-bold text-slate-900 mt-4">{QUADRANTS[0].description}</p>
              </div>

              <div className="border border-amber-200 bg-amber-50/50 p-4 rounded">
                <span className="text-xs font-bold tracking-wider text-amber-800 uppercase block">Personalised Insight</span>
                <p className="text-xs text-slate-700 mt-1 font-medium">Evaluasi tingkat empati sosial serta sinergi hubungan tim antar unit kerja berada dalam parameter optimal. Marcom dinilai cakap menyelaraskan pesan brand hotel selaras dengan kebutuhan pasar lokal.</p>
              </div>

              <div className="space-y-2">
                <span className="text-xs font-bold uppercase tracking-wider text-slate-400 block">Breakdown Skor Per Pilar Kompetensi</span>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="p-4 rounded border bg-white print-card space-y-2">
                    <div className="flex justify-between items-center text-xs">
                      <div>
                        <span className="text-[10px] text-slate-400 font-bold uppercase block">Pillar 3</span>
                        <span className="font-bold text-slate-800">Social Awareness</span>
                      </div>
                      <span className="px-2 py-0.5 bg-emerald-50 text-emerald-600 font-bold rounded text-[10px]">Good</span>
                    </div>
                    <div className="text-xl font-bold font-mono text-emerald-600">{p3.toFixed(1)}/10.0</div>
                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-emerald-600 h-1.5 rounded-full" style={{ width: `${(p3/10)*100}%` }}></div>
                    </div>
                  </div>

                  <div className="p-4 rounded border bg-white print-card space-y-2">
                    <div className="flex justify-between items-center text-xs">
                      <div>
                        <span className="text-[10px] text-slate-400 font-bold uppercase block">Pillar 4</span>
                        <span className="font-bold text-slate-800">Relationship Management</span>
                      </div>
                      <span className="px-2 py-0.5 bg-rose-50 text-rose-600 font-bold rounded text-[10px]">Good</span>
                    </div>
                    <div className="text-xl font-bold font-mono text-rose-600">{p4.toFixed(1)}/10.0</div>
                    <div className="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
                      <div className="bg-rose-600 h-1.5 rounded-full" style={{ width: `${(p4/10)*100}%` }}></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto my-6 p-4 w-full">
          <div className="bg-white rounded border border-slate-200 shadow-sm overflow-hidden">
            <div className="bg-slate-50 border-b px-6 py-3 flex justify-between items-center text-xs text-slate-500 font-medium">
              <span>The Global Emotional Intelligence Test — Part 2</span>
              <span>Progress: {Math.round((Object.keys(answers).length / QUESTIONS.length) * 100)}%</span>
            </div>
            <div className="divide-y divide-slate-100">
              {QUESTIONS.map(q => (
                <div key={q.id} className="p-6 space-y-3">
                  <p className="text-sm font-medium text-slate-800">{q.id}. {q.text}</p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2 pl-4">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = answers[q.id]?.index === oIdx;
                      return (
                        <button key={oIdx} onClick={() => handleAnswerChange(q.id, { index: oIdx, score: opt.score })} className={`p-3 text-left text-xs rounded border transition-all cursor-pointer ${isSelected ? 'bg-slate-900 text-white border-transparent font-medium shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}>
                          {opt.text}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
            <div className="p-4 bg-slate-50 border-t flex justify-end">
              <button disabled={!isAllAnswered} onClick={() => { setAppState('RESULTS'); window.scrollTo(0,0); }} className="px-6 py-2 bg-slate-900 text-white rounded text-xs font-semibold disabled:opacity-30 disabled:cursor-not-allowed cursor-pointer">
                Lihat Hasil Analisa Matrix (Part 2)
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
