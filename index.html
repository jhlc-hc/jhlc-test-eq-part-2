<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Global EI Test - Part 1 (Pillar 1 & 2)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      overflow-x: hidden;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    @media print {
      body {
        background: white !important;
        color: black !important;
      }
      header, footer, button, .print-hidden {
        display: none !important;
      }
      .shadow-sm, .shadow-xl, .shadow-md, .shadow-lg {
        box-shadow: none !important;
      }
      .border {
        border-color: #cbd5e1 !important;
      }
      .print-card {
        border: 2px solid #cbd5e1 !important;
        background-color: #fff !important;
      }
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50/50 min-h-screen text-slate-800 antialiased flex flex-col select-none">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- DATA PILAR KHUSUS PART 1 (PILAR 1 & PILAR 2) ---
    const QUADRANTS = [
      {
        id: 1,
        name: 'Self-Awareness',
        englishName: 'Pillar 1',
        description: 'Kesadaran diri terhadap dorongan emosi dan dampaknya pada cara Anda berperilaku.',
        color: 'text-indigo-600',
        borderColor: 'border-indigo-100',
        progressColor: 'bg-indigo-600',
        bgColor: 'bg-indigo-50/30'
      },
      {
        id: 2,
        name: 'Self-Regulation',
        englishName: 'Pillar 2',
        description: 'Kemampuan mengendalikan dorongan impulsif, beradaptasi dengan perubahan, dan tetap fokus di bawah tekanan.',
        color: 'text-sky-600',
        borderColor: 'border-sky-100',
        progressColor: 'bg-sky-600',
        bgColor: 'bg-sky-50/30'
      }
    ];

    // --- DATA JAWABAN & PERTANYAAN KHUSUS SOAL 1-20 ---
    const QUESTIONS = [
      // Pillar 1 - Self-Awareness
      { id: 1, quadrant: 1, text: 'Emosi saya umumnya', options: [{ text: 'Memiliki dampak yang besar pada cara saya berperilaku.', score: 1 }, { text: 'Hampir tidak berdampak pada cara saya berperilaku.', score: 0 }] },
      { id: 2, quadrant: 1, text: 'Saya umumnya dipandu oleh', options: [{ text: 'Tujuan dan nilai-nilai saya.', score: 1 }, { text: 'Tujuan dan nilai-nilai lainnya.', score: 0 }] },
      { id: 3, quadrant: 1, text: 'Saat saya berada di bawah tekanan, saya biasanya memiliki', options: [{ text: 'Mengubah perilaku dari biasanya.', score: 1 }, { text: 'Perilaku yang tetap tidak berubah.', score: 0 }] },
      { id: 4, quadrant: 1, text: 'Saya umumnya belajar paling banyak', options: [{ text: 'Dari refleksi atas pengalaman masa lalu.', score: 1 }, { text: 'Dengan melakukan aktivitas secara aktif.', score: 0 }] },
      { id: 5, quadrant: 1, text: 'Saya umumnya', options: [{ text: 'Saya memiliki selera humor yang baik tentang diri saya sendiri.', score: 1 }, { text: 'Menganggap diri saya serius.', score: 0 }] },
      { id: 6, quadrant: 1, text: 'Saya memperkenalkan diri.', options: [{ text: 'Dengan rasa percaya diri dan memiliki "kharisma".', score: 0 }, { text: 'Dengan sedikit rasa percaya diri dan kehati-hatian.', score: 1 }] },
      { id: 7, quadrant: 1, text: 'Di mana pun ada ketidakpastian dan tekanan, saya selalu', options: [{ text: 'Tegas dan mengambil keputusan yang tepat.', score: 0 }, { text: 'Berhati-hati dalam mengambil keputusan yang tepat.', score: 1 }] },
      { id: 8, quadrant: 1, text: 'Saya selalu menyuarakan pandangan bahwa', options: [{ text: 'Tidak populer dan berani mengambil risiko demi kebenaran.', score: 1 }, { text: 'Sebagian besar orang lain setuju dan mendukungnya.', score: 0 }] },
      { id: 9, quadrant: 1, text: 'Saya selalu suka', options: [{ text: 'Menghadapi tantangan baru.', score: 1 }, { text: 'Mempertahankan status quo.', score: 0 }] },
      { id: 10, quadrant: 1, text: 'Saya umumnya', options: [{ text: 'Menumbuhkan kepercayaan pada orang lain.', score: 1 }, { text: 'Mengandalkan kepercayaan orang lain.', score: 0 }] },

      // Pillar 2 - Self-Regulation
      { id: 11, quadrant: 2, text: 'Saya umumnya', options: [{ text: 'Mengendalikan emosi dan dorongan impulsif saya yang mengganggu.', score: 1 }, { text: 'Membiarkan emosi dan suasana hati saya mempengaruhi perilaku saya.', score: 0 }] },
      { id: 12, quadrant: 2, text: 'Saat saya berada di bawah tekanan', options: [{ text: 'Saya berpikir jernih dan tetap fokus.', score: 1 }, { text: 'Saya mudah teralihkan perhatiannya oleh hal-hal lain.', score: 0 }] },
      { id: 13, quadrant: 2, text: 'Saya selalu', options: [{ text: 'Lakukan seperti yang kukatakan akan kulakukan.', score: 1 }, { text: 'Hanya melakukan apa yang harus saya lakukan.', score: 0 }] },
      { id: 14, quadrant: 2, text: 'Kepercayaan dari orang lain', options: [{ text: 'Dibangun berdasarkan keandalan dan keaslian.', score: 1 }, { text: 'Diberikan kepada saya secara otomatis.', score: 0 }] },
      { id: 15, quadrant: 2, text: 'Saya selalu', options: [{ text: 'Fleksibel dalam cara saya melihat peristiwa.', score: 1 }, { text: 'Mampu melihat peristiwa apa adanya.', score: 0 }] },
      { id: 16, quadrant: 2, text: 'Saat situasi berubah, saya selalu', options: [{ text: 'Menangani berbagai tuntutan dan prioritas yang berubah-ubah dengan lancar.', score: 1 }, { text: 'Bekerja keras untuk mencoba memenuhi tuntutan tersebut.', score: 0 }] },
      { id: 17, quadrant: 2, text: 'Saya selalu', options: [{ text: 'Menetapkan tujuan yang menantang bagi diri saya sendiri.', score: 1 }, { text: 'Menyelesaikan tujuan yang telah ditetapkan untuk saya.', score: 0 }] },
      { id: 18, quadrant: 2, text: 'Ketika hambatan dan kemunduran terjadi dalam mengejar tujuan saya, saya selalu', options: [{ text: 'Tetaplah berupaya mencapai tujuan meskipun apa pun yang telah terjadi.', score: 1 }, { text: 'Menyesuaikan kembali tujuan dan/atau harapan.', score: 0 }] },
      { id: 19, quadrant: 2, text: 'Secara umum, saya', options: [{ text: 'Mengejar tujuan di luar apa yang diduga atau diharapkan dari saya.', score: 1 }, { text: 'Mengejar tujuan hanya sejauh yang dituntut dari saya.', score: 0 }] },
      { id: 20, quadrant: 2, text: 'Ketika saya mengidentifikasi peluang, saya selalu', options: [{ text: 'Proaktif dalam mengejar peluang tersebut.', score: 1 }, { text: 'Ragu apakah akan mengejar kesempatan tersebut.', score: 0 }] }
    ];

    // --- LANDING PAGE COMPONENT ---
    function LandingPage({ onStart }) {
      return (
        <div className="max-w-4xl mx-auto my-6 p-1 md:p-6">
          <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="relative bg-slate-50 border-b border-slate-200 px-6 py-12 text-center">
              <div className="relative z-10 max-w-2xl mx-auto">
                <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-600 border border-indigo-100 mb-4">
                  Sesi Pelatihan Internal: Part 1 (Pillar 1 & 2)
                </span>
                <h1 className="text-3xl md:text-5xl font-light text-slate-900 tracking-tight mb-4">
                  The Global <span className="font-semibold">Emotional Intelligence</span> Test
                </h1>
                <p className="text-slate-500 text-sm max-w-xl mx-auto leading-relaxed">
                  Evaluasi mandiri terfokus pada pilar kesadaran diri dan regulasi emosi personal guna memaksimalkan performa kerja, ketahanan mental, serta stabilitas diri di bawah tekanan.
                </p>
              </div>
            </div>

            <div className="p-6 md:p-10 flex flex-col items-center justify-center space-y-8">
              <div className="w-full max-w-xl space-y-4 text-sm text-slate-600 text-center leading-relaxed">
                <p className="font-bold text-slate-400 uppercase tracking-wider text-xs">Pilar Yang Dievaluasi pada Part 1:</p>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-left p-4 bg-slate-50 rounded-2xl border border-slate-200 text-xs max-w-md mx-auto">
                  <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-600" /><span>Pillar 1: Self-Awareness</span></div>
                  <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-sky-600" /><span>Pillar 2: Self-Regulation</span></div>
                </div>
              </div>

              <div className="w-full max-w-xs pt-2">
                <button 
                  onClick={onStart} 
                  className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-semibold text-sm rounded-xl cursor-pointer transition-all shadow-md shadow-slate-900/10 hover:shadow-lg text-center tracking-wide"
                >
                  Mulai Pengisian Tes (Part 1)
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // --- QUESTION CARD COMPONENT ---
    function QuestionCard({ questions, currentQuadrant, answers, onAnswerChange, onNext, onPrevious, isFirstStep, isLastStep, totalPercent }) {
      const unansweredCount = questions.filter(q => answers[q.id] === undefined).length;
      const isQuadrantComplete = unansweredCount === 0;

      const colors = {
        1: { text: 'text-indigo-600', bg: 'bg-indigo-600', light: 'bg-indigo-50/10' },
        2: { text: 'text-sky-600', bg: 'bg-sky-600', light: 'bg-sky-50/10' }
      }[currentQuadrant.id];

      return (
        <div className="max-w-4xl mx-auto my-4 p-1 md:p-6">
          <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
              <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Langkah {currentQuadrant.id} dari 2</span>
              <span className="text-xs font-semibold text-slate-500 font-mono">Progress: {Math.round(totalPercent)}%</span>
            </div>

            <div className={`p-6 ${colors.light} border-b border-slate-200`}>
              <span className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide bg-white border border-slate-200 mb-1.5 ${colors.text}`}>
                {currentQuadrant.englishName}
              </span>
              <h2 className="text-xl font-semibold text-slate-900">{currentQuadrant.name}</h2>
              <p className="text-xs text-slate-500 mt-1">{currentQuadrant.description}</p>
            </div>

            <div className="divide-y divide-slate-100">
              {questions.map((q) => (
                <div key={q.id} className="p-6 space-y-3">
                  <div className="flex gap-3">
                    <span className="inline-flex items-center justify-center w-6 h-6 rounded-full bg-slate-100 text-xs font-mono text-slate-500 shrink-0">{q.id}</span>
                    <p className="text-sm font-medium text-slate-800 pt-0.5">{q.text}</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-2 pl-9">
                    {q.options.map((opt, oIdx) => {
                      const isSelected = answers[q.id]?.index === oIdx;
                      return (
                        <button
                          key={oIdx}
                          type="button"
                          onClick={() => onAnswerChange(q.id, { index: oIdx, score: opt.score })}
                          className={`p-3 text-left text-xs rounded-xl border transition-all cursor-pointer ${
                            isSelected ? `${colors.bg} text-white border-transparent font-medium shadow-sm` : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                          }`}
                        >
                          {opt.text}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

            <div className="bg-slate-50 border-t border-slate-200 px-6 py-4 flex items-center justify-between">
              <button type="button" onClick={onPrevious} disabled={isFirstStep} className={`px-4 py-2 border rounded-full text-xs text-slate-500 bg-white hover:bg-slate-50 cursor-pointer ${isFirstStep ? 'opacity-30 pointer-events-none' : ''}`}>
                Kembali
              </button>
              <button type="button" onClick={onNext} disabled={!isQuadrantComplete} className={`px-5 py-2 rounded-full text-xs font-semibold cursor-pointer ${isQuadrantComplete ? 'bg-slate-900 text-white hover:bg-slate-800' : 'bg-slate-200 text-slate-400 pointer-events-none'}`}>
                {isLastStep ? 'Selesai & Lihat Hasil' : 'Langkah Berikutnya'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- SCORE DASHBOARD KHUSUS PART 1 ---
    function ScoreDashboard({ answers, onReset }) {
      const [name, setName] = useState('');
      const [hotelUnit, setHotelUnit] = useState('');

      let totalEQScorePart1 = 0;

      const pilarResults = QUADRANTS.map((quad) => {
        const minQ = (quad.id - 1) * 10 + 1; // Untuk ID 1 = 1, ID 2 = 11
        const maxQ = quad.id * 10;          // Untuk ID 1 = 10, ID 2 = 20
        let score = 0;
        for (let i = minQ; i <= maxQ; i++) {
          score += answers[i]?.score || 0;
        }

        totalEQScorePart1 += score;

        let statusText = '';
        let badgeColor = '';
        if (score >= 8.0) {
          statusText = 'Excellent';
          badgeColor = 'bg-emerald-100 text-emerald-800 border-emerald-200';
        } else if (score >= 6.0) {
          statusText = 'Good';
          badgeColor = 'bg-blue-100 text-blue-800 border-blue-200';
        } else if (score >= 4.0) {
          statusText = 'Average';
          badgeColor = 'bg-amber-100 text-amber-800 border-amber-200';
        } else {
          statusText = 'Needs Development';
          badgeColor = 'bg-rose-100 text-rose-800 border-rose-200';
        }

        return { ...quad, score, statusText, badgeColor };
      });

      const totalPercentage = Math.round((totalEQScorePart1 / 20) * 100);

      // LOGIKA PENILAIAN PERSONALISED FEEDBACK (Skor Max Part 1 = 20.0)
      let generalLabel = '';
      let generalFeedbackText = '';
      if (totalEQScorePart1 >= 16.0) {
        generalLabel = 'Kesadaran Diri & Regulasi Emosi Internal Luar Biasa';
        generalFeedbackText = 'Luar biasa! Hasil Anda di Part 1 menunjukkan tingkat kesadaran diri yang mendalam dan kontrol emosi yang matang. Anda memiliki kapasitas psikologis yang kuat untuk tetap tenang di bawah tekanan target, mengenali pemicu stres kerja secara objektif, serta mampu membuat keputusan strategis yang rasional tanpa terpengaruh oleh letupan emosi sesaat.';
      } else if (totalEQScorePart1 >= 12.0) {
        generalLabel = 'Kapasitas Regulasi Diri Baik dengan Ruang Pengembangan Minor';
        generalFeedbackText = 'Kerja yang bagus! Secara umum, penguasaan emosi dan pemahaman diri Anda sudah berada di level yang sehat dan fungsional. Anda mampu menjaga fokus pada target harian. Untuk mengoptimalkan efisiensi, cobalah memberikan perhatian ekstra pada teknik kelenturan (fleksibilitas) cara pandang saat menghadapi perubahan situasi mendadak.';
      } else if (totalEQScorePart1 >= 8.0) {
        generalLabel = 'Kapasitas Internal Rata-rata dengan Kebutuhan Pengembangan Menengah';
        generalFeedbackText = 'Hasil Anda di batas rata-rata. Kompetensi internal Anda memadai untuk penanganan kendala operasional biasa, namun rentan terdistraksi jika dihadapkan pada tekanan bertubi-tubi. Disarankan untuk melatih regulasi emosi secara sadar, meluangkan waktu evaluasi mandiri setelah kegagalan, dan bersikap lebih asertif.';
      } else {
        generalLabel = 'Memerlukan Pembinaan & Penataan Regulasi Diri Intrapersonal';
        generalFeedbackText = 'Perhatian diperlukan. Skor Anda menunjukkan bahwa manajemen stres dan pengenalan kelemahan/kelebihan diri menjadi area kritis yang wajib dibenahi segera. Sangat dianjurkan untuk mengikuti professional coaching, melatih teknik mindfulness/relaksasi taktis, serta mengendalikan dorongan impulsif demi stabilitas profesionalisme kerja.';
      }

      return (
        <div className="max-w-4xl mx-auto my-4 p-1 md:p-6">
          <div className="bg-white rounded-3xl border border-slate-200 shadow-md p-6 md:p-8 space-y-6">
            
            {/* INPUT IDENTITAS AKHIR */}
            <div className="print-hidden bg-slate-50 border border-slate-200 p-5 rounded-2xl grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="space-y-1">
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Nama / Inisial Markom</label>
                <input 
                  type="text" 
                  value={name} 
                  onChange={(e) => setName(e.target.value)} 
                  placeholder="Ketik nama Anda di sini..." 
                  className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-slate-400 font-medium transition-all"
                />
              </div>
              <div className="space-y-1">
                <label className="block text-xs font-bold text-slate-500 uppercase tracking-wider">Unit Hotel / Cluster Properti</label>
                <input 
                  type="text" 
                  value={hotelUnit} 
                  onChange={(e) => setHotelUnit(e.target.value)} 
                  placeholder="Contoh: Marcom - JHL Solitaire..." 
                  className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-slate-400 font-medium transition-all"
                />
              </div>
            </div>

            {/* HEADER REPORT */}
            <div className="border-b border-slate-100 pb-4 flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
              <div>
                <span className="text-[10px] font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2.5 py-0.5 rounded-md uppercase tracking-wider">
                  Official Competency Report &mdash; Part 1
                </span>
                <h1 className="text-xl font-extrabold text-slate-900 tracking-tight mt-1">Self Awareness & Regulation Matrix</h1>
                <p className="text-xs text-slate-500 font-medium mt-0.5">
                  Personnel: <span className="text-slate-800 font-bold">{name || 'Assessment Tanpa Nama'}</span> &bull; Unit: <span className="text-slate-800 font-bold">{hotelUnit || 'General Cluster / Property'}</span>
                </p>
              </div>
              
              <div className="print-hidden flex items-center gap-2">
                <button 
                  onClick={() => window.print()} 
                  className="px-4 py-2.5 bg-slate-100 border border-slate-200 text-slate-700 rounded-xl text-xs font-bold hover:bg-slate-200 cursor-pointer transition-all"
                >
                  Export Report (PDF)
                </button>
                <button 
                  onClick={onReset} 
                  className="px-4 py-2.5 bg-slate-900 text-white rounded-xl text-xs font-bold hover:bg-slate-800 cursor-pointer transition-all"
                >
                  Reset Tes
                </button>
              </div>
            </div>

            {/* YELLOW RECTANGLE BANNER RESULT SCORE */}
            <div className="bg-[#FFFF00] border-2 border-slate-900 p-6 rounded-sm text-center space-y-2 shadow-sm print-card">
              <h2 className="text-xs font-extrabold text-slate-900 tracking-widest uppercase">Part 1 Cumulative Score</h2>
              <div className="text-5xl font-black font-mono text-slate-900 tracking-tighter">
                {totalEQScorePart1.toFixed(1)}
                <span className="text-xl font-bold opacity-60 font-sans ml-1">/20.0</span>
              </div>
              <p className="text-xs font-bold text-slate-900 md:text-sm tracking-tight pt-1">
                {totalPercentage}% &mdash; {generalLabel}
              </p>
            </div>

            {/* PERSONALISED FEEDBACK PANEL (BAHASA INDONESIA) */}
            <div className="border border-amber-200 bg-amber-50/50 p-5 rounded-md space-y-1.5 print-card">
              <h3 className="text-[10px] font-bold tracking-widest uppercase text-amber-900/80 block">Personalised Feedback</h3>
              <p className="text-xs text-slate-800 leading-relaxed font-semibold">
                {generalFeedbackText}
              </p>
            </div>

            {/* BREAKDOWN DETAIL PILAR 1 DAN 2 */}
            <div className="space-y-3">
              <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Breakdown Skor per Pilar Kompetensi</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                {pilarResults.map((p) => (
                  <div key={p.id} className="p-4 rounded-xl border border-slate-200 bg-white space-y-3 print-card">
                    <div className="flex justify-between items-start gap-2">
                      <div>
                        <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">{p.englishName}</span>
                        <h5 className="text-xs font-bold text-slate-900">{p.name}</h5>
                      </div>
                      <span className={`px-2 py-0.5 text-[9px] font-bold rounded border ${p.badgeColor}`}>
                        {p.statusText}
                      </span>
                    </div>
                    <div className="space-y-1">
                      <div className="flex justify-between text-[10px] font-mono">
                        <span className="text-slate-400">Score Matrix</span>
                        <span className="font-bold text-slate-800">{p.score.toFixed(1)}/10.0</span>
                      </div>
                      <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden border border-slate-200/40">
                        <div className={`${p.progressColor} h-full rounded-full`} style={{ width: `${(p.score / 10) * 100}%` }} />
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // --- MAIN ENGINE APP CONTROL ---
    function App() {
      const [appState, setAppState] = useState('LANDING');
      const [answers, setAnswers] = useState({});
      const [currentQuadrantIndex, setCurrentQuadrantIndex] = useState(0);

      const handleStart = () => {
        setAnswers({});
        setCurrentQuadrantIndex(0);
        setAppState('QUESTIONS');
      };

      const handleAnswerChange = (qId, answerObj) => {
        setAnswers(prev => ({ ...prev, [qId]: answerObj }));
      };

      const handleNext = () => {
        if (currentQuadrantIndex < QUADRANTS.length - 1) {
          setCurrentQuadrantIndex(prev => prev + 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          setAppState('RESULTS');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const handlePrevious = () => {
        if (currentQuadrantIndex > 0) {
          setCurrentQuadrantIndex(prev => prev - 1);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      };

      const currentQuadrant = QUADRANTS[currentQuadrantIndex];
      const currentQuestions = QUESTIONS.filter(q => q.quadrant === currentQuadrant.id);
      const totalPercent = (Object.keys(answers).length / QUESTIONS.length) * 100;

      return (
        <div className="flex flex-col min-h-screen">
          <header className="bg-white border-b border-slate-200 px-6 py-4 print-hidden flex justify-between items-center">
            <div className="flex items-center gap-2">
              <div className="w-2.5 h-2.5 rounded-full bg-slate-900" />
              <span className="text-xs font-bold tracking-wider uppercase text-slate-900">EQ Part 1 Analytics</span>
            </div>
            <span className="text-[10px] font-bold uppercase px-2 py-0.5 bg-slate-100 text-slate-700 rounded-md border border-slate-200">
              Internal Corporate Dashboard
            </span>
          </header>

          <main className="flex-1 w-full p-2 md:p-4">
            {appState === 'LANDING' && <LandingPage onStart={handleStart} />}
            {appState === 'QUESTIONS' && (
              <QuestionCard
                questions={currentQuestions}
                currentQuadrant={currentQuadrant}
                answers={answers}
                onAnswerChange={handleAnswerChange}
                onNext={handleNext}
                onPrevious={handlePrevious}
                isFirstStep={currentQuadrantIndex === 0}
                isLastStep={currentQuadrantIndex === QUADRANTS.length - 1}
                totalPercent={totalPercent}
              />
            )}
            {appState === 'RESULTS' && (
              <ScoreDashboard 
                answers={answers} 
                onReset={() => {
                  setAppState('LANDING');
                  setAnswers({});
                  setCurrentQuadrantIndex(0);
                }} 
              />
            )}
          </main>

          <footer className="py-5 bg-white border-t border-slate-200 text-center text-[9px] text-slate-400 uppercase tracking-widest print-hidden">
            Corporate Digital Marketing Section &copy; 2026
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
